{% extends 'base.html' %}

{% block title %}Delete {{ book.title }} - Bookstore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 overflow-hidden">
            <div class="bg-danger py-4 text-center text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor"
                    class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
                    <path
                        d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
                </svg>
            </div>
            <div class="card-body p-4 text-center">
                <h3 class="fw-bold mb-3">Are you sure?</h3>
                <p class="text-muted mb-4">
                    You are about to delete <strong>{{ book.title }}</strong> by {{ book.author }}.
                    This action cannot be undone.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger p-2 fw-bold">Yes, Delete Permanently</button>
                        <a href="{% url 'shop:book_detail' book.pk %}" class="btn btn-outline-secondary p-2">Cancel and
                            Go Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
